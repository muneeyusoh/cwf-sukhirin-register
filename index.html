<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ลงทะเบียนสมาชิกกองทุนสวัสดิการชุมชน</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body { background-color: #F4F7F9; padding: 20px; font-family: sans-serif; }
    .form-container { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); max-width: 500px; margin: auto; }
    #systemLoading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: flex; flex-direction: column; justify-content: center; align-items: center; }
  </style>
</head>
<body>

<div id="systemLoading">
  <div class="spinner-border text-primary mb-2"></div>
  <p>กำลังเชื่อมต่อระบบ LINE...</p>
</div>

<div class="form-container">
  <h5 class="mb-3 text-center text-primary fw-bold">สมัครสมาชิกใหม่</h5>
  <form id="registerForm" onsubmit="handleFormSubmit(event)">
    <input type="hidden" id="uid" name="uid">
    <input type="hidden" id="displayName" name="displayName">

    <div class="mb-3">
      <label class="form-label small">ชื่อ-นามสกุล</label>
      <input type="text" class="form-control" name="fullName" required>
    </div>
    <div class="mb-3">
      <label class="form-label small">เลขบัตรประชาชน</label>
      <input type="text" class="form-control" name="nationalId" maxlength="13" required>
    </div>
    <div class="mb-3">
      <label class="form-label small">เบอร์โทรศัพท์</label>
      <input type="text" class="form-control" name="phone" maxlength="10" required>
    </div>
    <div class="mb-4">
      <label class="form-label small">ศูนย์ประสานงาน</label>
      <select class="form-select" name="center" required>
        <option value="">-- เลือกศูนย์ประสานงาน --</option>
          <option value="ชุมชนเกียร์">ชุมชนเกียร์</option>
          <option value="ชุมชนมาโมง">ชุมชนมาโมง</option>
          <option value="ชุมชนสุคิริน">ชุมชนสุคิริน</option>
          <option value="ชุมชนราชฎสามัคคี">ชุมชนราชฎสามัคคี</option>
          <option value="ชุมชนกลันตัน">ชุมชนกลันตัน</option>
          <option value="ชุมชนปารีย์">ชุมชนปารีย์</option>
        </select>
      </select>
    </div>

    <button type="submit" class="btn btn-success w-100" id="submitBtn">ยืนยันการลงทะเบียน</button>
  </form>
</div>

<script>
  const LIFF_ID = "2010764982-RCKkyPZG"; 
  // วาง Web App URL จาก Google Apps Script ตรงนี้
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw3y6fgA99GEtuPRFn0QKIKwZe3zzq6Ms3XFfIh0xCKhmuvDCADvHvJ70V3LPeVqJUU/exec"; 

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        document.getElementById('uid').value = profile.userId;
        document.getElementById('displayName').value = profile.displayName;
        document.getElementById('systemLoading').style.display = 'none';
      } else {
        liff.login();
      }
    } catch (err) {
      alert("LIFF Error: " + err.message);
    }
  });

  async function handleFormSubmit(event) {
    event.preventDefault();
    document.getElementById('submitBtn').disabled = true;
    document.getElementById('submitBtn').innerText = "กำลังบันทึกข้อมูล...";

    const formData = new FormData(event.target);
    const dataObject = Object.fromEntries(formData.entries());

    try {
      // ส่งข้อมูลตรงเข้า API หลังบ้านโดยไม่ผ่านการครอบ Iframe
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        body: JSON.stringify(dataObject)
      });
      
      const result = await response.json();
      
      if (result.status === 'success') {
        Swal.fire('สำเร็จ', result.message, 'success').then(() => liff.closeWindow());
      } else {
        Swal.fire('แจ้งเตือน', result.message, 'warning');
        document.getElementById('submitBtn').disabled = false;
        document.getElementById('submitBtn').innerText = "ยืนยันการลงทะเบียน";
      }
    } catch (error) {
      Swal.fire('ข้อผิดพลาด', 'เซิร์ฟเวอร์ไม่ตอบสนอง', 'error');
      document.getElementById('submitBtn').disabled = false;
    }
  }
</script>

</body>
</html>
