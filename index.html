<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ลงทะเบียนสมาชิกกองทุนสวัสดิการชุมชน</title>
  
  <!-- นำเข้า Google Fonts: Prompt สำหรับความ Modern -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Prompt:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  
  <!-- นำเข้า Bootstrap 5 และ SweetAlert2 -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  
  <style>
    :root {
      --fintech-primary: #0A2540;   /* Deep Navy */
      --fintech-accent: #635BFF;    /* FinTech Blue/Purple */
      --fintech-success: #00D084;   /* Emerald Green */
      --bg-light: #F7F9FC;
    }

    body { 
      background-color: var(--bg-light); 
      font-family: 'Prompt', sans-serif; 
      color: #333;
      -webkit-font-smoothing: antialiased;
    }

    /* Header Design */
    .app-header {
      background: linear-gradient(135deg, var(--fintech-primary), #113a63);
      color: white;
      padding: 40px 20px 60px;
      text-align: center;
      border-bottom-left-radius: 24px;
      border-bottom-right-radius: 24px;
      box-shadow: 0 4px 12px rgba(10, 37, 64, 0.15);
    }

    .app-header h5 {
      font-weight: 600;
      letter-spacing: 0.5px;
      margin-bottom: 5px;
    }

    /* Card Design */
    .form-container { 
      background: white; 
      padding: 30px 25px; 
      border-radius: 16px; 
      box-shadow: 0 10px 30px rgba(0,0,0,0.05); 
      max-width: 500px; 
      margin: -40px auto 30px; 
      position: relative;
      border: 1px solid rgba(0,0,0,0.05);
    }

    /* Floating Labels & Inputs */
    .form-floating > label {
      color: #8898AA;
      font-weight: 400;
    }
    
    .form-control, .form-select {
      border-radius: 10px;
      border: 1px solid #E2E8F0;
      background-color: #F8FAFC;
      transition: all 0.2s ease-in-out;
    }

    .form-control:focus, .form-select:focus {
      background-color: #FFFFFF;
      border-color: var(--fintech-accent);
      box-shadow: 0 0 0 4px rgba(99, 91, 255, 0.1);
    }

    /* Button Styling */
    .btn-fintech {
      background-color: var(--fintech-primary);
      color: white;
      border-radius: 10px;
      padding: 14px;
      font-weight: 500;
      font-size: 1.1rem;
      border: none;
      transition: all 0.3s;
      margin-top: 10px;
    }

    .btn-fintech:hover, .btn-fintech:focus {
      background-color: #06182c;
      color: white;
      transform: translateY(-2px);
      box-shadow: 0 8px 15px rgba(10, 37, 64, 0.2);
    }

    .btn-fintech:disabled {
      background-color: #A0AEC0;
      transform: none;
      box-shadow: none;
    }

    /* Loading Overlay */
    #systemLoading { 
      position: fixed; 
      top: 0; left: 0; 
      width: 100%; height: 100%; 
      background: rgba(255, 255, 255, 0.9); 
      backdrop-filter: blur(5px);
      z-index: 9999; 
      display: flex; 
      flex-direction: column; 
      justify-content: center; 
      align-items: center; 
    }
    
    .spinner-border {
      width: 3rem;
      height: 3rem;
      color: var(--fintech-accent);
      border-width: 0.25em;
    }
  </style>
</head>
<body>

<!-- Loading Screen -->
<div id="systemLoading">
  <div class="spinner-border mb-3" role="status"></div>
  <p class="text-muted fw-medium">กำลังตรวจสอบข้อมูลความปลอดภัย...</p>
</div>

<!-- App Header -->
<div class="app-header">
  <h5>ระบบสมัครสมาชิก</h5>
  <p class="opacity-75 small mb-0">กองทุนสวัสดิการชุมชนเทศบาลตำบลสุคิริน</p>
</div>

<!-- Main Form Card -->
<div class="container">
  <div class="form-container">
    <h6 class="mb-4 text-center fw-bold" style="color: var(--fintech-primary);">ข้อมูลยืนยันตัวตน (KYC)</h6>
    
    <form id="registerForm" onsubmit="handleFormSubmit(event)">
      <input type="hidden" id="uid" name="uid">
      <input type="hidden" id="displayName" name="displayName">

      <div class="form-floating mb-3">
        <input type="text" class="form-control" id="fullName" name="fullName" placeholder="ชื่อ-นามสกุล" required>
        <label for="fullName">ชื่อ-นามสกุล (ตามบัตรประชาชน)</label>
      </div>
      
      <div class="form-floating mb-3">
        <input type="tel" class="form-control" id="nationalId" name="nationalId" placeholder="เลขประจำตัวประชาชน 13 หลัก" maxlength="13" pattern="\d{13}" required>
        <label for="nationalId">เลขประจำตัวประชาชน 13 หลัก</label>
      </div>
      
      <div class="form-floating mb-3">
        <input type="tel" class="form-control" id="phone" name="phone" placeholder="เบอร์โทรศัพท์ติดต่อ" maxlength="10" pattern="\d{9,10}" required>
        <label for="phone">เบอร์โทรศัพท์ติดต่อ</label>
      </div>
      
      <div class="form-floating mb-4">
        <select class="form-select" id="center" name="center" required>
          <option value="" disabled selected>-- เลือกศูนย์ใกล้บ้านท่าน --</option>
          <option value="ชุมชนเกียร์">ชุมชนเกียร์</option>
          <option value="ชุมชนมาโมง">ชุมชนมาโมง</option>
          <option value="ชุมชนสุคิริน">ชุมชนสุคิริน</option>
          <option value="ชุมชนราชฎสามัคคี">ชุมชนราชฎสามัคคี</option>
          <option value="ชุมชนกลันตัน">ชุมชนกลันตัน</option>
          <option value="ชุมชนปารีย์">ชุมชนปารีย์</option>
        </select>
        <label for="center">สังกัดศูนย์ประสานงาน</label>
      </div>

      <button type="submit" class="btn btn-fintech w-100" id="submitBtn">ยืนยันการลงทะเบียน</button>
    </form>
  </div>
</div>

<script>
  const LIFF_ID = "2010764982-RCKkyPZG"; 
  const GAS_API_URL = "https://script.google.com/macros/s/AKfycbw3y6fgA99GEtuPRFn0QKIKwZe3zzq6Ms3XFfIh0xCKhmuvDCADvHvJ70V3LPeVqJUU/exec"; 

  document.addEventListener("DOMContentLoaded", async () => {
    try {
      await liff.init({ liffId: LIFF_ID });
      if (liff.isLoggedIn()) {
        const profile = await liff.getProfile();
        document.getElementById('uid').value = profile.userId;
        document.getElementById('displayName').value = profile.displayName;
        document.getElementById('systemLoading').style.display = 'none';
      } else {
        liff.login();
      }
    } catch (err) {
      document.getElementById('systemLoading').innerHTML = `
        <div class="text-danger text-center px-4">
          <h6 class="fw-bold">พบข้อผิดพลาดของระบบ (LIFF Error)</h6>
          <p class="text-muted small">${err.message}</p>
        </div>`;
    }
  });

  async function handleFormSubmit(event) {
    event.preventDefault();
    const submitBtn = document.getElementById('submitBtn');
    submitBtn.disabled = true;
    submitBtn.innerHTML = '<span class="spinner-border spinner-border-sm me-2" role="status" aria-hidden="true"></span>กำลังเข้ารหัสข้อมูล...';

    const formData = new FormData(event.target);
    const dataObject = Object.fromEntries(formData.entries());

    try {
      // ส่งข้อมูลตรงเข้า API หลังบ้าน
      const response = await fetch(GAS_API_URL, {
        method: "POST",
        // แนะนำให้ส่งเป็น text/plain สำหรับ GAS เพื่อหลีกเลี่ยง CORS Preflight
        headers: {
          "Content-Type": "text/plain;charset=utf-8",
        },
        body: JSON.stringify(dataObject)
      });
      
      const result = await response.json();
      
      if (result.status === 'success') {
        Swal.fire({
          title: 'สำเร็จ',
          text: result.message,
          icon: 'success',
          confirmButtonColor: '#0A2540'
        }).then(() => liff.closeWindow());
      } else {
        Swal.fire({
          title: 'แจ้งเตือน',
          text: result.message,
          icon: 'warning',
          confirmButtonColor: '#0A2540'
        });
        submitBtn.disabled = false;
        submitBtn.innerText = "ยืนยันการลงทะเบียน";
      }
    } catch (error) {
      Swal.fire({
        title: 'ข้อผิดพลาด',
        text: 'เซิร์ฟเวอร์ไม่ตอบสนอง หรือเครือข่ายมีปัญหา',
        icon: 'error',
        confirmButtonColor: '#0A2540'
      });
      submitBtn.disabled = false;
      submitBtn.innerText = "ยืนยันการลงทะเบียน";
    }
  }
</script>

</body>
</html>
